<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NovasourceCommand</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-content">
    <div class="splash-logo">Novasource<span>Command</span></div>
    <div class="splash-sub">Control de Turno</div>
    <div class="splash-spinner">
      <div></div><div></div><div></div>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">Novasource<span>Command</span></div>
    <div class="semana-row">
      <span class="semana-badge" id="semana-badge">S––</span>
      <span class="semana-dates" id="semana-dates">--</span>
    </div>
  </div>
  <div class="header-right">
    <div>
      <div class="clock" id="clock">--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>
  </div>
</header>

<!-- USER BAR -->
<div class="user-bar">
  <div class="user-info">
    <div class="user-dot"></div>
    <span id="user-name">--</span>
  </div>
  <div class="user-actions">
    <button class="btn-icon" id="btn-personal">+ Personal</button>
    <button class="btn-icon" id="btn-print">⬇ PDF</button>
    <button class="btn-icon admin hidden" id="btn-admin">⚙ Admin</button>
    <button class="btn-icon" id="btn-logout">Salir</button>
  </div>
</div>

<!-- PROGRESO -->
<div class="progress-bar">
  <div class="progress-top">
    <span class="progress-label">Checklist de cierre</span>
    <span class="progress-count" id="prog-count">0 / 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width: 0%"></div>
  </div>
</div>

<!-- CHECKLIST -->
<div class="content" id="checklist">
  <div class="loading-msg">Cargando checklist...</div>
</div>

<!-- BOTTOM -->
<div class="bottom-bar">
  <button class="btn-confirm" id="btn-confirm">CONFIRMAR TRASPASO</button>
</div>

<!-- MODAL: ÍTEM PERSONAL -->
<div class="modal-overlay hidden" id="modal-personal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Agregar ítem personal</span>
      <button class="modal-close" id="btn-close-personal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="personal-texto" placeholder="Ej: Revisar estado generador 3">
      </div>
      <div class="auth-error" id="personal-error"></div>
      <button class="btn-auth" id="btn-add-personal">AGREGAR</button>
    </div>
  </div>
</div>

<!-- MODAL: COMENTARIOS -->
<div class="modal-overlay hidden" id="modal-comentarios">
  <div class="modal modal-tall">
    <div class="modal-header">
      <span class="modal-title" id="comentarios-titulo">Comentarios</span>
      <button class="modal-close" id="btn-close-comentarios">✕</button>
    </div>

    <!-- Tabs Global / Personal -->
    <div class="tabs" style="border-top:none">
      <button class="tab active" data-ctab="global">Global</button>
      <button class="tab" data-ctab="personal">Personal</button>
    </div>

    <!-- Lista comentarios -->
    <div class="comentarios-list" id="comentarios-list">
      <div class="loading-msg">Cargando...</div>
    </div>

    <!-- Input nuevo comentario -->
    <div class="comentarios-input">
      <input type="text" id="comentario-texto" placeholder="Escribe un comentario...">
      <button class="btn-send" id="btn-send-comentario">↑</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
